services:
  postgres:
    image: postgres:16-alpine
    container_name: hw-fileparser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hwfileparser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hwfileparser_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hwfileparser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hwfileparser_pgdata:
